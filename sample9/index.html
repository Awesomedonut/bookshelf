<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Index of /~donut/books</title>
<style>
body{font-family:"Courier New",monospace;background:#fff;color:#000;margin:18px;font-size:14px}
h1{font-size:24px;font-weight:normal}.path{background:#eee;border:1px solid #ccc;padding:6px;margin-bottom:12px}
table{border-collapse:collapse;width:100%;max-width:980px}th{text-align:left;border-bottom:1px solid #999;padding:4px;color:#333}td{padding:4px;border-bottom:1px dotted #ddd;vertical-align:top}
a{color:#00e}a:visited{color:#551a8b}.icon{width:28px}.size{text-align:right;color:#666}.date{color:#666;white-space:nowrap}.desc{color:#333}
.shelf-row td{background:#eee;font-weight:bold;border-top:2px solid #aaa}.cover{width:38px;height:56px;object-fit:cover;border:1px solid #999;vertical-align:middle;margin-right:8px}.star{color:#f90}
pre{border-top:1px solid #999;margin-top:18px;padding-top:8px}
</style>
</head>
<body>
<h1>Index of /~donut/books</h1>
<div class="path">Apache/1.3.29 Server at homepages.example.net Port 80</div>
<table>
<thead><tr><th class="icon"></th><th>Name</th><th>Last modified</th><th class="size">Size</th><th>Description</th></tr></thead>
<tbody id="rows"><tr><td>📁</td><td><a href="../">Parent Directory</a></td><td class="date">26-Apr-2026 10:04</td><td class="size">-</td><td></td></tr></tbody>
</table>
<pre>Generated by mod_autoindex. This server is best viewed with Lynx, Netscape, or patience.</pre>
<script>
const SHELVES=[['currently-reading','currently-reading/'],['read','read/'],['want-to-read','want-to-read/'],['marinating','skimmed-for-later/'],['on-hold','on-hold/']];
function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML}
fetch('../books.json').then(r=>r.json()).then(books=>{const rows=document.getElementById('rows');SHELVES.forEach(([id,label],i)=>{const all=books.filter(b=>b.shelf===id),items=all.slice(0,3);if(!all.length)return;rows.innerHTML+=`<tr class="shelf-row" id="${id}"><td>📁</td><td><a href="#${id}">${label}</a></td><td class="date">26-Apr-2026 0${i}:42</td><td class="size">-</td><td>${all.length} files</td></tr>`;items.forEach((b,j)=>{rows.innerHTML+=`<tr><td>📕</td><td><img class="cover" src="../${esc(b.cover)}" alt=""><a href="#">${b.starred?'<span class="star">*</span> ':''}${esc(b.title).toLowerCase().replaceAll(' ','-')}.html</a></td><td class="date">10-Apr-2026 ${10+j}:13</td><td class="size">${(42+j*7)}K</td><td class="desc">${esc(b.author)}${b.comment?' - '+esc(b.comment):''}</td></tr>`})})});
</script>
</body>
</html>
