<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my bookshelf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- floating particles -->
  <div class="particles" aria-hidden="true"></div>

  <header>
    <button class="theme-toggle" id="theme-toggle" aria-label="Switch theme">
      <span class="theme-toggle-icon" data-cozy="&#x2615;" data-retro="&#x1F47E;"></span>
    </button>
    <h1>my bookshelf</h1>
    <p class="subtitle">a cozy little corner for my reads</p>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" role="tab" aria-selected="true" data-shelf="currently-reading">
      Currently Reading
    </button>
    <button class="tab" role="tab" aria-selected="false" data-shelf="read">
      Read
    </button>
    <button class="tab" role="tab" aria-selected="false" data-shelf="want-to-read">
      Want to Read
    </button>
  </nav>

  <main>
    <section class="shelf-container">
      <div class="books-grid" id="books-grid"></div>
      <div class="shelf-plank"></div>
    </section>
    <p class="empty-msg" id="empty-msg" hidden>nothing here yet... time to add some books!</p>
  </main>

  <footer>
    <p>made with love & too many cups of tea</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
