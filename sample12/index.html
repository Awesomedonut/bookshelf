<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bookster P2P Tape Transfer</title>
<style>
body{margin:0;background:#151515;font-family:Tahoma,Arial,sans-serif;font-size:11px;color:#111;padding:18px;background-image:repeating-linear-gradient(0deg,#151515 0 5px,#202020 5px 10px)}
.app{width:930px;margin:auto;background:#d4d0c8;border:2px outset #fff;box-shadow:10px 10px 0 #000}
.title{background:linear-gradient(90deg,#0a246a,#a6caf0);color:#fff;font-weight:bold;padding:4px 6px}.menu{padding:4px 8px;border-bottom:1px solid #888}.menu span{text-decoration:underline;margin-right:14px}
.body{display:grid;grid-template-columns:310px 1fr;gap:8px;padding:8px}
.deck{background:#2a2a2a;color:#ddd;border:3px inset #777;padding:10px}.lcd{background:#061206;color:#54ff54;border:3px inset #555;font-family:"Courier New",monospace;padding:8px;text-shadow:0 0 6px #54ff54}.lcd b{font-size:18px}
.tape{background:#111;border:4px inset #777;margin-top:10px;padding:12px}.reels{display:flex;justify-content:space-around;align-items:center}.reel{width:92px;height:92px;border-radius:50%;background:repeating-conic-gradient(#ccc 0 8deg,#333 8deg 16deg);border:8px solid #888;animation:spin 3s linear infinite}.reel:nth-child(2){animation-duration:2s}@keyframes spin{to{transform:rotate(360deg)}}.band{height:18px;background:#6b3e18;border:2px solid #222;margin:12px 20px}
.meters{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;height:58px;align-items:end;margin-top:10px}.meters span{background:linear-gradient(#f33,#ff0,#0f0);height:25px}.meters span:nth-child(3n){height:52px}.meters span:nth-child(4n){height:14px}
.buttons span{display:inline-block;background:linear-gradient(#999,#333);color:#fff;border:2px outset #777;padding:5px 8px;margin:6px 2px 0}.red{color:#ff5c5c!important}
.peers{margin-top:10px;background:#fff;border:2px inset #fff;padding:7px}.peers a{display:block;color:#00e;margin:3px 0}
.results{background:#fff;border:2px inset #fff}.search{background:#ece9d8;border-bottom:1px solid #999;padding:6px}input{width:62%}
.shelf h2{font-size:12px;margin:0;background:#003399;color:#fff;padding:4px 6px}.count{float:right}.track{display:grid;grid-template-columns:22px 48px 1fr 60px 64px;gap:6px;align-items:center;border-top:1px solid #ddd;padding:5px}.track:nth-child(even){background:#eef3ff}.track img{width:48px;height:66px;object-fit:cover}.t{color:#00e;text-decoration:underline;font-weight:bold}.a{color:#555}.c{font-size:10px;color:#333}.status{color:#008000}.star{color:#f60}
.foot{border-top:1px solid #999;padding:5px 8px;background:#ece9d8}
</style>
</head>
<body>
<div class="app"><div class="title">Bookster P2P + Cassette Bridge - connected as donut_1337</div><div class="menu"><span>F</span>ile <span>T</span>ransfers <span>S</span>earch <span>T</span>ape Deck <span>H</span>elp</div><div class="body"><aside class="deck"><div class="lcd"><b>ENCODING SHELF MIX</b><br>source: books.json<br>mode: preview-only stereo</div><div class="tape"><div class="reels"><div class="reel"></div><div class="reel"></div></div><div class="band"></div></div><div class="meters"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="buttons"><span>rew</span><span>play</span><span>pause</span><span class="red">dub</span></div><div class="peers"><b>Peers with rare books</b><div id="links"></div></div></aside><main class="results"><div class="search">Search: <input value="rare book mix tape"> <button>Find</button></div><div id="shelves"></div></main></div><div class="foot">15 fictional transfers shown. Actual files remain books, not downloads.</div></div>
<script>
const SHELVES=[['currently-reading','Active Dubs'],['read','Finished Transfers'],['want-to-read','Queued Requests'],['marinating','Half-Recorded'],['on-hold','Paused Tapes']];
function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML}
fetch('../books.json').then(r=>r.json()).then(books=>{const root=document.getElementById('shelves'),links=document.getElementById('links');let n=1;SHELVES.forEach(([id,label])=>{const all=books.filter(b=>b.shelf===id),items=all.slice(0,3);if(!all.length)return;links.innerHTML+=`<a href="#${id}">${label}</a>`;const sec=document.createElement('section');sec.className='shelf';sec.id=id;sec.innerHTML=`<h2>${label}<span class="count">${all.length}</span></h2>${items.map(b=>`<div class="track"><div>${n++}</div><img src="../${esc(b.cover)}" alt=""><div><div class="t">${b.starred?'<span class="star">★</span> ':''}${esc(b.title)}.mp3</div><div class="a">${esc(b.author)}</div>${b.comment?`<div class="c">${esc(b.comment)}</div>`:''}</div><div>${Math.floor(20+n*3)} MB</div><div class="status">${id==='on-hold'?'paused':'seeding'}</div></div>`).join('')}`;root.appendChild(sec)})});
</script>
</body>
</html>
