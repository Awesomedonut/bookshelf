<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GIFCities Book Sticker Machine</title>
<style>
body{margin:0;background:#ff6ad5;font-family:"Comic Sans MS",Tahoma,sans-serif;font-size:12px;color:#260022;background-image:repeating-linear-gradient(45deg,#ff6ad5 0 18px,#9bf6ff 18px 36px,#fdff6a 36px 54px)}
.wall{width:900px;margin:18px auto;background:#fff;border:8px ridge #2600ff;box-shadow:12px 12px 0 #260022}
.header{text-align:center;background:#2600ff;color:#fdff6a;padding:10px;text-shadow:2px 2px #ff006e}h1{font-size:38px;margin:0}.header marquee{background:#fdff6a;color:#ff006e;border:3px dashed #fff;margin-top:6px}
.layout{display:grid;grid-template-columns:210px 1fr;gap:10px;padding:10px}
.machine{background:#c0c0c0;border:5px outset #fff;padding:8px;text-align:center}.slot{background:#000;color:#0f0;font-family:"Courier New",monospace;border:3px inset #777;padding:8px;margin:8px 0}.knob{width:90px;height:90px;border-radius:50%;background:conic-gradient(#eee,#777,#eee);border:6px outset #fff;margin:12px auto}.tray{background:#111;border:4px inset #777;height:60px;color:#fff;display:grid;place-items:center}
.buttons span{display:inline-block;background:#ff006e;color:#fff;border:2px outset #fff;padding:3px 6px;margin:2px;font-weight:bold}
.shelf{background:#fff8fb;border:4px solid #2600ff;margin-bottom:10px}.shelf h2{margin:0;background:#fdff6a;color:#2600ff;padding:5px 8px;font-size:18px}.count{float:right;color:#ff006e}
.stickers{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px}.book{background:#9bf6ff;border:3px dashed #ff006e;padding:6px;text-align:center;transform:rotate(-2deg);box-shadow:4px 4px 0 #fdff6a}.book:nth-child(2){transform:rotate(2deg)}.book img{width:100%;aspect-ratio:2/3;object-fit:cover;border:4px ridge #fff}.t{font-weight:bold;color:#2600ff;margin-top:5px}.a{font-style:italic}.c{background:#fff;border:1px dotted #2600ff;margin-top:4px;padding:4px;font-size:10px;text-align:left}.star{background:#ff006e;color:#fff}
</style>
</head>
<body>
<div class="wall"><div class="header"><h1>GIFCities Sticker Machine</h1><marquee>turn the knob for three glitter book stickers from each shelf!!!</marquee></div><div class="layout"><aside class="machine"><div class="slot">INSERT 25¢<br>BOOK STICKERS</div><div class="knob"></div><div class="buttons"><span>sparkle</span><span>blink</span><span>print</span></div><div class="tray">fresh stickers drop here</div></aside><main id="shelves"></main></div></div>
<script>
const SHELVES=[['currently-reading','fresh sticker roll'],['read','album page'],['want-to-read','wishlist decals'],['marinating','mystery capsule'],['on-hold','jammed dispenser']];
function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML}
fetch('../books.json').then(r=>r.json()).then(books=>{const root=document.getElementById('shelves');SHELVES.forEach(([id,label])=>{const all=books.filter(b=>b.shelf===id),items=all.slice(0,3);if(!all.length)return;const sec=document.createElement('section');sec.className='shelf';sec.innerHTML=`<h2>${label}<span class="count">${all.length}</span></h2><div class="stickers">${items.map(b=>`<div class="book"><img src="../${esc(b.cover)}" alt=""><div class="t">${b.starred?'<span class="star">RARE</span> ':''}${esc(b.title)}</div><div class="a">${esc(b.author)}</div>${b.comment?`<div class="c">${esc(b.comment)}</div>`:''}</div>`).join('')}</div>`;root.appendChild(sec)})});
</script>
</body>
</html>
