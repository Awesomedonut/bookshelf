<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book-O-Matic Shockwave Kiosk</title>
<style>
body{margin:0;background:#000;color:white;font-family:Arial Black,Impact,sans-serif;background-image:radial-gradient(circle at 50% 20%,#4422aa,#000 60%);padding:18px}
.kiosk{width:900px;margin:auto;border:8px outset #aaa;background:#2b2b34;box-shadow:0 0 0 4px #000,14px 14px 0 #000}
.chrome{background:linear-gradient(#fff,#7aa,#345,#fff);color:#001733;padding:10px;border-bottom:5px solid #111}.chrome h1{margin:0;font-size:34px;letter-spacing:2px}.badge{float:right;background:#ff0;color:#c00;border:4px outset #fff;padding:8px;transform:rotate(4deg)}
.machine{display:grid;grid-template-columns:280px 1fr;gap:12px;padding:12px}.wheel{height:360px;background:#050517;border:5px inset #777;position:relative;overflow:hidden}
.orbit{position:absolute;inset:40px;border:2px dashed #0ff;border-radius:50%;animation:spin 12s linear infinite}.orbit:nth-child(2){inset:82px;border-color:#f0f;animation-duration:8s}.orbit:nth-child(3){inset:126px;border-color:#ff0;animation-duration:5s}@keyframes spin{to{transform:rotate(360deg)}}
.slot{position:absolute;left:42px;right:42px;bottom:28px;background:#111;border:4px inset #999;color:#0f0;font-family:"Courier New",monospace;text-align:center;padding:12px}
.lever{margin-top:10px;background:#111;border:3px inset #777;padding:10px}.lever span{display:block;background:#c00;color:#fff;border:4px outset #f99;text-align:center;padding:12px;font-size:18px}
.shelf{border:4px solid #0ff;background:#080820;margin-bottom:12px}.shelf h2{margin:0;background:linear-gradient(90deg,#0ff,#f0f,#ff0);color:#000;padding:6px 9px;font-size:17px;text-shadow:1px 1px #fff}.count{float:right}
.books{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:9px}.book{background:#11114a;border:3px outset #77f;padding:7px;text-align:center;font-family:Arial,Helvetica,sans-serif;font-size:11px}.book img{width:100%;aspect-ratio:2/3;object-fit:cover;border:3px solid #fff;box-shadow:0 0 10px #0ff}.t{color:#ff0;font-weight:bold;margin-top:5px}.a{color:#0ff}.c{font-size:10px;background:#000;border:1px solid #f0f;margin-top:5px;padding:4px;text-align:left}.star{color:#f0f}
</style>
</head>
<body>
<div class="kiosk"><div class="chrome"><span class="badge">SHOCKWAVE<br>READY</span><h1>Book-O-Matic 3000</h1>insert curiosity, pull lever, receive shelf portals</div><div class="machine"><aside><div class="wheel"><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div><div class="slot">LOADING BOOK CARTRIDGES...</div></div><div class="lever"><span>PULL LEVER</span></div></aside><main id="shelves"></main></div></div>
<script>
const SHELVES=[['currently-reading','Cartridge A: Now Playing'],['read','Cartridge B: Completed'],['want-to-read','Cartridge C: Wishlist'],['marinating','Cartridge D: Bonus Zone'],['on-hold','Cartridge E: Suspended']];
function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML}
fetch('../books.json').then(r=>r.json()).then(books=>{const root=document.getElementById('shelves');SHELVES.forEach(([id,label])=>{const all=books.filter(b=>b.shelf===id),items=all.slice(0,3);if(!all.length)return;const sec=document.createElement('section');sec.className='shelf';sec.innerHTML=`<h2>${label}<span class="count">${all.length}</span></h2><div class="books">${items.map(b=>`<div class="book"><img src="../${esc(b.cover)}" alt=""><div class="t">${b.starred?'<span class="star">◆</span> ':''}${esc(b.title)}</div><div class="a">${esc(b.author)}</div>${b.comment?`<div class="c">${esc(b.comment)}</div>`:''}</div>`).join('')}</div>`;root.appendChild(sec)})});
</script>
</body>
</html>
